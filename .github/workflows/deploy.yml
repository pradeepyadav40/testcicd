name: CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  validate-job:
    name: Validate and Lint Terraform
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4.1.0
      - uses: hashicorp/setup-terraform@v3.1.1
        with:
          terraform_version: 1.14.7
      - run: terraform fmt -check -recursive
      - run: terraform init -backend=false
      - run: terraform validate
      - uses: terraform-linters/tflint-action@v3.0.0
        with:
          args: --format compact
      - uses: aquasecurity/tfsec-action@v1.0.11

  plan-job:
    name: Plan Infrastructure
    runs-on: ubuntu-latest
    needs: validate-job
    permissions:
      id-token: write
      contents: read
      pull-requests: write
    env:
      TF_VERSION: 1.14.7
      AWS_REGION: us-east-1
    steps:
      - uses: actions/checkout@v4.1.0
      - uses: hashicorp/setup-terraform@v3.1.1
        with:
          terraform_version: 1.14.7
      - uses: actions/cache@v4.0.0
        with:
          path: ~/.terraform.d/plugin-cache
          key: runner.os-terraform-hashFiles(**/.terraform.lock.hcl)
      - uses: aws-actions/configure-aws-credentials@v4.0.2
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/${{ secrets.AWS_ROLE_NAME }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: GitHubActions
      - run: terraform init
      - run: terraform plan -input=false -out=plan.tfplan
      - uses: actions/upload-artifact@v4.0.0
        with:
          name: terraform-plan
          path: plan.tfplan
          retention-days: 1
      - name: Comment plan on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7.0.1
        with:
          script: |
            const plan = fs.readFileSync('plan.tfplan', 'utf8');
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `Terraform Plan:

\`${plan}\``
            });

  apply-job:
    name: Apply Infrastructure
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    needs: plan-job
    environment:
      name: production
      url: https://console.aws.amazon.com
    permissions:
      id-token: write
      contents: read
    env:
      TF_VERSION: 1.14.7
      AWS_REGION: us-east-1
    steps:
      - uses: actions/checkout@v4.1.0
      - uses: hashicorp/setup-terraform@v3.1.1
        with:
          terraform_version: 1.14.7
      - uses: actions/cache@v4.0.0
        with:
          path: ~/.terraform.d/plugin-cache
          key: runner.os-terraform-hashFiles(**/.terraform.lock.hcl)
      - uses: aws-actions/configure-aws-credentials@v4.0.2
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/${{ secrets.AWS_ROLE_NAME }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: GitHubActions
      - run: terraform init
      - uses: actions/download-artifact@v4.0.0
        with:
          name: terraform-plan
      - run: terraform apply -input=false plan.tfplan
      - run: echo "Success! Check the deployment at ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
      - run: echo "Failure! Check the deployment at ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"